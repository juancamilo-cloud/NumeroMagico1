<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego del Número Mágico</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Enlace al CSS -->
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="container">
    <h1>Número Mágico 1.0</h1>
    <p>Adivina el número entre 1 y 100</p>

    
    <input type="number" id="guessInput" min="1" max="100" placeholder="Ingresa un número">

    <!-- Botón para enviar -->
    <button id="guessBtn">Intentar</button>

    <!-- Mensaje de retroalimentación -->
    <div class="message" id="message"></div>

    <!-- Historial de intentos -->
    <div class="history" id="history"></div>

    <!-- Botón para reiniciar -->
    <button id="resetBtn">Volver a jugar</button>
</div>

<!-- Enlace al JavaScript -->
<script src="/js/script.js"></script>

</body>
</html>
